name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run data sweep
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_IDS: ${{ secrets.TELEGRAM_CHANNEL_IDS }}
        run: |
          mkdir -p _site
          node scripts/export-static.mjs _site/data.json || echo '{"error":"sweep failed"}' > _site/data.json

      - name: Build static site
        run: |
          cp dashboard/public/jarvis.html _site/index.html
          cp dashboard/public/loading.html _site/loading.html 2>/dev/null || true
          cp -r dashboard/public/locales _site/locales 2>/dev/null || true
          # Patch: redirect fetch('/api/data') to static data.json
          sed -i "s|fetch('/api/data')|fetch('./data.json')|g" _site/index.html
          # Also patch: location.protocol check so Pages loads data even on https
          sed -i "s|location.protocol === 'file:'|false|g" _site/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
